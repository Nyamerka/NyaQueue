server:
  addr: ":9090"
  data_dir: "data"

broker:
  segment_max_bytes: 20971520      # 20MB
  segment_max_count: 100
  retention_max_bytes: 1073741824  # 1GB
  retention_max_age: "168h"
  flush_interval_ms: 1000
  compression_type: 0

  max_connections: 1024
  recv_buffer_bytes: 65536
  send_buffer_bytes: 65536
  max_message_bytes: 1048576       # 1MB
  read_timeout_ms: 30000
  write_timeout_ms: 30000
  num_network_goroutines: 4

  num_io_goroutines: 4
  max_queued_requests: 500

  batch_size: 100
  batch_memory_bytes: 65536
  linger_ms: 5

  fetch_min_bytes: 1
  fetch_max_wait_ms: 500
  max_fetch_bytes: 1048576         # 1MB
  consumer_session_timeout_ms: 30000

producer:
  addr: "localhost:9090"
  topic: "bench"
  scenario: "uniform"
  producers: 4
  partitions: 4
  duration: "0s"                   # 0 = run forever
  metrics_addr: ":8081"

consumer:
  addr: "localhost:9090"
  topic: "bench"
  group: "bench-group"
  partitions: []                   # empty = consume all partitions
  workers: 4
  metrics_addr: ":8082"

broker_exporter:
  broker_addr: "localhost:9090"
  metrics_addr: ":8083"
  scrape_interval: "1s"

experiment:
  mode: "inprocess"
  scenarios: "all"
  algorithms: "all"
  kafka_brokers: "localhost:9092"
  output: "experiments/results"
  duration: "10s"

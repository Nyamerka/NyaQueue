global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: broker-exporter
    static_configs:
      - targets: ["broker-exporter:8083"]
        labels:
          service: nyaqueue-broker

  - job_name: producer
    static_configs:
      - targets: ["producer:8081"]
        labels:
          service: nyaqueue-producer

  - job_name: consumer
    static_configs:
      - targets: ["consumer:8082"]
        labels:
          service: nyaqueue-consumer

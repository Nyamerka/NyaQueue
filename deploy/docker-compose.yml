services:
  broker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: broker
    ports:
      - "9090:9090"
      - "8080:8080"
    volumes:
      - nyaqueue-data:/data
    cpus: "2.0"
    mem_limit: "1.5g"
    sysctls:
      net.ipv4.tcp_tw_reuse: 1
      net.ipv4.tcp_fin_timeout: 30
      net.ipv4.ip_local_port_range: "1024 65000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  broker-exporter:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: broker-exporter
    ports:
      - "8083:8083"
    depends_on:
      - broker
    cpus: "0.25"
    mem_limit: "256m"

  producer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: producer
    ports:
      - "8081:8081"
    depends_on:
      - broker
    cpus: "0.5"
    mem_limit: "256m"

  consumer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: consumer
    ports:
      - "8082:8082"
    depends_on:
      - broker
      - producer
    cpus: "0.5"
    mem_limit: "256m"

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=24h"
    depends_on:
      - broker-exporter
    cpus: "0.25"
    mem_limit: "512m"

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    cpus: "0.25"
    mem_limit: "256m"

  kafka:
    profiles: ["kafka"]
    image: public.ecr.aws/bitnami/kafka:3.8
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - kafka-data:/bitnami/kafka
    cpus: "1.5"
    mem_limit: "1.5g"

  experiment:
    profiles: ["experiment"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: experiment
    command:
      - "--experiment.mode=inprocess,grpc,http,kafka"
      - "--experiment.scenarios=all"
      - "--experiment.algorithms=all"
      - "--experiment.kafka_brokers=kafka:9092"
      - "--experiment.broker_addr=broker:9090"
      - "--experiment.http_broker_addr=broker:8080"
      - "--experiment.duration=30s"
      - "--experiment.output=/results"
    depends_on:
      - broker
      - kafka
    volumes:
      - ./results:/results
    sysctls:
      net.ipv4.tcp_tw_reuse: 1
      net.ipv4.tcp_fin_timeout: 30
      net.ipv4.ip_local_port_range: "1024 65000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  nyaqueue-data:
  kafka-data:
  prometheus-data:
  grafana-data:

services:
  # --- NyaQueue broker ---
  nyaqueue:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: broker
    ports:
      - "9090:9090"
    volumes:
      - nyaqueue-data:/data

  # --- NyaQueue load generator ---
  nyaqueue-loadgen:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: loadgen
    command:
      - "--target=nyaqueue"
      - "--addr=nyaqueue:9090"
      - "--scenario=uniform"
      - "--duration=60s"
      - "--topic=bench"
    depends_on:
      - nyaqueue

  # --- Kafka (KRaft mode, no Zookeeper) ---
  kafka:
    image: bitnami/kafka:3.8
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka

  # --- Kafka load generator ---
  kafka-loadgen:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: loadgen
    command:
      - "--target=kafka"
      - "--addr=kafka:9092"
      - "--scenario=uniform"
      - "--duration=60s"
      - "--topic=bench"
    depends_on:
      - kafka

  # --- Full comparison experiment ---
  experiment:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: experiment
    command:
      - "--mode=inprocess,kafka"
      - "--scenarios=all"
      - "--algorithms=all"
      - "--kafka-brokers=kafka:9092"
      - "--duration=30s"
      - "--output=/results"
    depends_on:
      - kafka
    volumes:
      - ./results:/results

volumes:
  nyaqueue-data:
  kafka-data:
